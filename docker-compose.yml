services:
  dashboard-api:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    working_dir: /app
    command: uvicorn dashboard.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    environment:
      PYTHONUNBUFFERED: "1"

  dashboard-ingest:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    working_dir: /app
    command: python -m dashboard.app.ingest_runner --mode incremental
    volumes:
      - ./:/app
    environment:
      PYTHONUNBUFFERED: "1"

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --protocol http2
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - dashboard-api

  wa-exporter:
    build:
      context: ./wa_import
      dockerfile: Dockerfile.baileys
    volumes:
      - ./wa_import/.baileys_auth:/app/.baileys_auth
      - ./wa_import/output:/app/output
    stdin_open: true    # needed for QR code scan on first run
    tty: true           # needed for QR code display
    profiles:
      - wa               # only runs when explicitly requested

volumes:
  meili_data:
