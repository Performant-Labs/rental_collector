<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7f8; color: #1f2937; }
      .page { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .header { margin-bottom: 16px; }
      .header h1 { margin: 0 0 8px; font-size: 28px; }
      .controls { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; margin-bottom: 16px; }
      .controls input, .controls select { padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
      .layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
      .panel { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; }
      .muted { color: #6b7280; font-size: 13px; }
      .facet-group { margin-bottom: 14px; }
      .facet-group h4 { margin: 0 0 8px; font-size: 14px; }
      .facet-option { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; font-size: 14px; }
      .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
      .card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; }
      .card h3 { margin: 0 0 8px; font-size: 16px; }
      .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eef2ff; font-size: 12px; color: #3730a3; }
      .pagination { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
      .pagination a { text-decoration: none; color: #111827; border: 1px solid #d1d5db; border-radius: 8px; padding: 6px 10px; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <h1>{{ title }}</h1>
        <div class="muted">HTMX dashboard over Meilisearch</div>
      </div>

      <form
        id="search-form"
        hx-get="/partials/search"
        hx-target="#search-content"
        hx-swap="innerHTML"
        hx-push-url="true"
        hx-trigger="submit, keyup changed delay:350ms from:#q, change from:select, change from:input[type=checkbox]"
      >
        <input type="hidden" name="page" value="{{ search.page }}" id="page-input" />
        <input type="hidden" name="per_page" value="{{ search.per_page }}" />

        <div class="controls">
          <input id="q" name="q" type="text" placeholder="Search title, description, location..." value="{{ search.query }}" />
          <select name="sort">
            <option value="relevance" {% if search.sort == 'relevance' %}selected{% endif %}>Relevance</option>
            <option value="price_asc" {% if search.sort == 'price_asc' %}selected{% endif %}>Price: Low to High</option>
            <option value="price_desc" {% if search.sort == 'price_desc' %}selected{% endif %}>Price: High to Low</option>
            <option value="recent" {% if search.sort == 'recent' %}selected{% endif %}>Most Recent</option>
          </select>
          <button type="submit">Search</button>
        </div>

        <div id="search-content">
          {% include "_search_content.html" %}
        </div>
      </form>
    </div>
  </body>
</html>
